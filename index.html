<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Pro - Sistema de Arribos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="card login-card">
            <h2>Logistics Pro</h2>
            <input type="email" id="email-input" placeholder="Correo">
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button id="login-btn">Entrar</button>
        </div>
    </div>

    <nav class="navbar">
        <h1>Control de Arribos</h1>
        <div><span id="user-display"></span> <button id="logout-btn" class="btn-danger">Salir</button></div>
    </nav>

    <div class="container">
        <section id="admin-view" class="hidden">
            <div class="grid">
                <div class="card">
                    <h3>📦 Catálogos</h3>
                    <input type="text" id="new-bodega" placeholder="Nueva Bodega">
                    <button onclick="guardarBodega()">+ Bodega</button>
                    <hr>
                    <input type="text" id="new-fletera" placeholder="Nueva Fletera">
                    <button onclick="guardarFletera()">+ Fletera</button>
                </div>
                <div class="card">
                    <h3>👥 Usuarios</h3>
                    <input type="text" id="user-fullname" placeholder="Nombre Completo">
                    <input type="email" id="user-email" placeholder="Correo Electrónico">
                    <select id="select-fletera-user"></select>
                    
                    <div style="margin-top: 15px;">
                        <strong style="display: block; margin-bottom: 10px; color: #1e293b;">Asignar Bodegas Permitidas:</strong>
                        <div id="bodegas-check-list" class="check-list">
                            </div>
                    </div>
                    
                    <button onclick="registrarUsuario()" style="width: 100%; margin-top: 10px;">Crear Acceso</button>
                </div>
            </div>
        </section>

        <section id="agenda-view" class="hidden">
            <div id="admin-controls-agenda" class="hidden card" style="background: #fff3cd; border-left: 5px solid #f59e0b;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <strong>Panel de Control:</strong>
                        <p style="margin: 5px 0 0 0; font-size: 0.85rem;">Habilite el día para que las fleteras puedan ver los cupos.</p>
                    </div>
                    <button onclick="habilitarDiaCompleto()" class="btn-success">Habilitar este Día</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                    <h3 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                        📅 Agenda: 
                        <input type="date" id="filtro-fecha" style="width: auto; margin: 0; padding: 5px 10px;">
                    </h3>
                    
                    <button onclick="actualizarTablaAgenda()" class="btn-sm" style="background: #64748b; display: flex; align-items: center; gap: 5px;">
                        🔄 Actualizar Agenda
                    </button>
                </div>

                <div class="table-scroll">
                    <table id="main-table">
                        <thead>
                            <tr>
                                <th style="width: 100px;">Hora</th>
                                <th>Envío (Universal)</th>
                                <th>Abasto (Bodegas Asignadas)</th>
                            </tr>
                        </thead>
                        <tbody id="agenda-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-cita" class="overlay hidden">
        <div class="card modal-content">
            <h3 id="modal-titulo">Nueva Cita</h3>
            <p id="modal-detalles"></p>
            <input type="text" id="in-operador" placeholder="Nombre Operador">
            <input type="text" id="in-placa" placeholder="Placas">
            <input type="text" id="in-tarjeta" placeholder="Núm. Tarjeta">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="confirmarCita()" class="btn-success">Confirmar</button>
                <button onclick="cerrarModal()" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
