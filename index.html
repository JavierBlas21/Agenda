<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Logístico de Arribos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="card login-card">
            <h2>Logistics Pro</h2>
            <input type="email" id="email-input" placeholder="Correo">
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button id="login-btn">Entrar</button>
        </div>
    </div>

    <nav class="navbar">
        <h1>Control de Citas</h1>
        <div>
            <span id="user-display"></span>
            <button id="logout-btn" class="btn-danger">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <section id="admin-view" class="hidden">
            <div class="grid">
                <div class="card">
                    <h3>📦 Bodegas y Fleteras</h3>
                    <input type="text" id="new-bodega" placeholder="Nombre Bodega">
                    <button onclick="guardarBodega()">+ Bodega</button>
                    <hr>
                    <input type="text" id="new-fletera" placeholder="Nombre Fletera">
                    <button onclick="guardarFletera()">+ Fletera</button>
                </div>
                <div class="card">
                    <h3>👥 Usuarios Coordinadores</h3>
                    <input type="text" id="user-fullname" placeholder="Nombre completo">
                    <input type="email" id="user-email" placeholder="Correo electrónico">
                    <select id="select-fletera-user"></select>
                    <div id="bodegas-check-list" class="check-list">
                        </div>
                    <button onclick="registrarUsuario()">Crear Acceso</button>
                </div>
            </div>
        </section>

        <section id="agenda-view" class="hidden">
            <div class="card">
                <h3>📅 Agenda de Citas</h3>
                <input type="date" id="filtro-fecha">
                <div class="table-scroll">
                    <table id="main-table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Envío (Libres)</th>
                                <th id="header-abasto">Abasto (Por Bodega)</th>
                            </tr>
                        </thead>
                        <tbody id="agenda-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-cita" class="overlay hidden">
        <div class="card modal-content">
            <h3 id="modal-titulo">Nueva Reservación</h3>
            <p id="modal-detalles"></p>
            <input type="text" id="in-operador" placeholder="Nombre Operador">
            <input type="text" id="in-placa" placeholder="Placas">
            <input type="text" id="in-tarjeta" placeholder="Núm. Tarjeta">
            <div class="btns">
                <button onclick="confirmarCita()" class="btn-success">Agendar</button>
                <button onclick="cerrarModal()" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
