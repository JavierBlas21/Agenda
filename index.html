<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Pro - Cementos Moctezuma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="card login-card">
            <h2 style="color:#e11d48">Logistics Pro</h2>
            <p>Cementos Moctezuma - Acceso</p>
            <input type="email" id="email-input" placeholder="Correo">
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button id="login-btn">Entrar</button>
        </div>
    </div>

    <nav class="navbar">
        <h1>Control de Arribos - Cementos Moctezuma</h1>
        <div><span id="user-display"></span> <button id="logout-btn" class="btn-danger">Salir</button></div>
    </nav>

    <div class="container">
        <section id="admin-view" class="hidden">
            <div class="grid">
                <div class="card">
                    <h3>📦 Catálogos</h3>
                    <input type="text" id="new-bodega" placeholder="Nueva Bodega">
                    <button onclick="guardarBodega()">+ Bodega</button>
                    <hr>
                    <input type="text" id="new-fletera" placeholder="Nueva Fletera">
                    <button onclick="guardarFletera()">+ Fletera</button>
                </div>
                <div class="card">
                    <h3>👥 Usuarios</h3>
                    <input type="text" id="user-fullname" placeholder="Nombre Completo">
                    <input type="email" id="user-email" placeholder="Correo Electrónico">
                    
                    <label>Rol del Usuario:</label>
                    <select id="select-rol-user" onchange="toggleCamposUsuario()">
                        <option value="COORDINADOR">COORDINADOR (Fletera)</option>
                        <option value="BASCULA">BASCULA (Control)</option>
                        <option value="ADMIN">ADMINISTRADOR</option>
                    </select>

                    <div id="campos-coordinador">
                        <select id="select-fletera-user"></select>
                        <div style="margin-top: 15px;">
                            <strong style="display: block; margin-bottom: 10px; color: #1e293b;">Asignar Bodegas:</strong>
                            <div id="bodegas-check-list" class="check-list"></div>
                        </div>
                    </div>
                    <button onclick="registrarUsuario()" style="width: 100%; margin-top: 10px;">Crear Acceso</button>
                </div>
            </div>
        </section>

        <section id="agenda-view" class="hidden">
            <div id="admin-controls-agenda" class="hidden card" style="background: #fff3cd; border-left: 5px solid #f59e0b;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div><strong>Panel Admin:</strong> <p style="margin:0; font-size:0.8rem;">Habilite cupos para esta fecha.</p></div>
                    <button onclick="habilitarDiaCompleto()" class="btn-success">Habilitar este Día</button>
                </div>
            </div>

            <div class="grid-main">
                <div class="card">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                        <h3 style="margin: 0;">📅 Agenda: <input type="date" id="filtro-fecha" style="width: auto;"></h3>
                        <button onclick="actualizarTodo()" class="btn-sm" style="background: #64748b;">🔄 Actualizar</button>
                    </div>
                    <div class="table-scroll">
                        <table id="main-table">
                            <thead>
                                <tr>
                                    <th>Hora</th>
                                    <th>Envío (Universal)</th>
                                    <th>Abasto (Bodegas)</th>
                                </tr>
                            </thead>
                            <tbody id="agenda-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>📑 Listado de Arribos</h3>
                    <div id="resumen-tonelaje" style="margin-bottom:10px; font-weight:bold; color:#10b981"></div>
                    <div id="listado-citas-container" class="listado-scroll"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-cita" class="overlay hidden">
        <div class="card modal-content">
            <h3 id="modal-titulo">Nueva Cita</h3>
            <p id="modal-detalles"></p>
            <input type="text" id="in-operador" placeholder="Nombre Operador">
            <input type="text" id="in-placa" placeholder="Placas">
            <input type="text" id="in-tarjeta" placeholder="Núm. Tarjeta">
            <label>Tonelaje:</label>
            <select id="in-toneladas">
                <option value="18">18 Toneladas</option>
                <option value="36">36 Toneladas</option>
                <option value="50">50 Toneladas</option>
            </select>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="confirmarCita()" class="btn-success">Confirmar</button>
                <button onclick="cerrarModal()" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
